services:
  - type: web
    name: sis-banda-api
    runtime: python
    runtimeVersion: 3.11
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: sis-banda-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://sis-banda.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: sis-banda-db
          property: connectionString
      - key: ACCESS_TOKEN_LIFETIME
        value: "3600"
      - key: REFRESH_TOKEN_LIFETIME
        value: "2592000"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
    healthCheckPath: /api/
    autoDeploy: true

databases:
  - name: sis-banda-db
    plan: free
    postgresDatabaseVersion: "15"
